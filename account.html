<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Speed Travel & Tours</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="small-container">
        <div class="header">
         <div class="navbar">
            <div class="logo">
                <a href="index.html">
                    <img src="images/Full speed logo.jpg" width="125px" alt="Full speed logo">
                </a>
            </div>
            <nav>
                <ul id="MenuItems">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="fleets.html">Our Fleets</a></li>
                    <li><a href="services.html">Tours</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <img src="images/menu-icon.jpg" class="menu-icon" onclick="menutoggle(); return false;">
           </div>
        </div>
    </div>

    <!-- Account Page -->
    <div class="account-page">
        <div class="container">
            <div class="row">
                <div class="col-2">
                    <img src="images/buses.jpg" width="100%" >
                </div>
                
                <div class="col-2">
                    <div class="form-container">
                        <div class="form-btn">        
                            <span onclick="login()">Login</span>
                            <span onclick="register()">Register</span>
                            <hr id="Indicator">
                         </div>
                         <form id="LoginForm">
                            <input type="text" placeholder="Username">
                            <input type="password" placeholder="Password">
                            <button type="submit" class="btn">Login</button>
                            <a href="">Forgot Password</a>
                         </form>
                         <form id="RegForm">
                            <input type="text" placeholder="Username">
                            <input type="email" placeholder="Email">
                            <input type="password" placeholder="Password">
                            <button type="submit" class="btn">Register</button>
                         </form>
                         </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="container">
            <div class="row">
                <div class="footer-col-2">
                    <h3><img src="images/Full speed logo.jpg" alt="Logo"></h3>
                    <p>Experience luxury travel and comfort</p>
                </div>
                <div class="footer-col-2">
                    <h3>Useful Links</h3>
                    <ul>
                        <li>Coupons</li>
                        <li>Blog Posts</li>
                        <li>Return Policy</li>
                        <li>Join Affiliate</li>
                    </ul>
                </div>
                <div class="footer-col-3">
                    <h3>Follow Us</h3>
                    <ul>
                        <li>Facebook</li>
                        <li>Instagram</li>
                        <li>X</li>
                    </ul>
                </div>
            </div>
            <hr>
            <p class="copyright">Copyright 2026 - Full Speed Travel & Tours</p>
        </div>
    </div>

    <!-- js for toggle Form -->
  <script>
   function login() {
    document.getElementById("RegForm").style.transform   = "translateX(0px)";
    document.getElementById("LoginForm").style.transform = "translateX(0px)";
    document.getElementById("Indicator").style.transform = "translateX(100px)";
   }


  function register() {
    document.getElementById("RegForm").style.transform   = "translateX(300px)";
    document.getElementById("LoginForm").style.transform = "translateX(300px)";
    document.getElementById("Indicator").style.transform = "translateX(0px)";
   }
</script>

</body>
</html>
