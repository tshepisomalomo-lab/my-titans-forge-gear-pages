<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Braai Master</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        .account-page {
            padding: 50px 0;
            background: #f8f8f8;
        }
        .form-container {
            background: #fff;
            width: 300px;
            height: 400px;
            position: relative;
            text-align: center;
            padding: 20px 0;
            margin: auto;
            box-shadow: 0 0 20px 0px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .form-btn {
            display: inline-block;
        }
        .form-btn span {
            font-weight: bold;
            padding: 0 30px;
            color: #555;
            cursor: pointer;
            width: 100px;
            display: inline-block;
        }
        .form-btn span.active {
            color: #ff523b; 
        }
        #Indicator {
            width: 100px;
            height: 3px;
            background: #ff523b;
            margin-top: 8px;
            transform: translateX(100px); 
            transition: transform 0.5s;
        }
        form {
            max-width: 300px;
            padding: 0 20px;
            position: absolute;
            top: 130px;
            transition: transform 0.5s;
        }
        #LoginForm {
            left: -300px; 
        }
        #RegForm {
            left: 0px; 
        }
        input {
            width: 100%;
            height: 30px;
            margin: 10px 0;
            padding: 0 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn {
            width: 100%;
            padding: 10px;
            background: #ff523b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 0;
        }
        .btn:hover {
            background: #e04532;
        }
        a {
            color: #ff523b;
            text-decoration: none;
        }
       
        .form-container.active-login #LoginForm { transform: translateX(0); }
        .form-container.active-login #RegForm { transform: translateX(300px); }
        .form-container.active-register #LoginForm { transform: translateX(-300px); }
        .form-container.active-register #RegForm { transform: translateX(0); }
        .form-container.active-register #Indicator { transform: translateX(100px); }
        .form-container.active-login #Indicator { transform: translateX(0px); }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="small-container">
        <div class="navbar">
            <div class="logo">
                <a href="index.html">
                    <img src="images/Full speed logo.jpg" width="125px" alt="Full speed logo">
                </a>
            </div>
            <nav>
                <ul id="MenuItems">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="fleets.html">Our Fleets</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- Account Page -->
    <div class="account-page">
        <div class="container">
            <div class="row">
                <div class="col-2">
                    <img src="images/steak.jpg" width="100%" alt="Fresh Meat">
                </div>
                
                <div class="col-2">
                    <div class="form-container" id="formContainer">
                        <div class="form-btn">        
                       <div class="form-toggle">
                         <span class="toggle-btn active" onclick="showLogin()">Login</span>
                         <span class="toggle-btn" onclick="showRegister()">Register</span>
                         <div class="indicator"></div>
                         </div>

                         <form>
                          <fieldset>
                           <legend>User Personal Information</legend>
                            <label for="name">Enter your full name:</label>
                              <input type="text" id="name" name="name" required />
                           <label for="email">Enter your email:</label>
                             <input type="email" id="email" name="email" required />
                           <label for="password">Enter your password:</label>
                              <input type="password" id="password" name="pass" required />
                           <label for="confirmPassword">Confirm your password:</label>
                             <input type="password" id="confirmPassword" name="confirmPass" required />    
                           <label for="address">Enter your Address:</label>
                             <textarea id="address" name="address" required></textarea>
                              <input type="submit" value="Submit" />
                          </fieldset>

                          <form id="RegForm" class="auth-form">
                           <input type="text" placeholder="Username" required>
                         <input type="email" placeholder="Email" required>
                           <input type="password" placeholder="Password" required>
                          <button type="submit" class="btn">Register</button>
                         </form>
                         </div>
                     </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="container">
            <div class="row">
                <div class="footer-col-2">
                    <h3><img src="images/Full speed logo.jpg" alt="Logo"></h3>
                    <p>Experience luxury travel and comfort</p>
                </div>
                <div class="footer-col-2">
                    <h3>Useful Links</h3>
                    <ul>
                        <li>Coupons</li>
                        <li>Blog Posts</li>
                        <li>Return Policy</li>
                        <li>Join Affiliate</li>
                    </ul>
                </div>
                <div class="footer-col-3">
                    <h3>Follow Us</h3>
                    <ul>
                        <li>Facebook</li>
                        <li>Instagram</li>
                        <li>X</li>
                    </ul>
                </div>
            </div>
            <hr>
            <p class="copyright">Copyright 2026 - Full Speed Travel & Tours</p>
        </div>
    </div>

    <!-- JavaScript for Toggle -->
    <script>
        var LoginForm = document.getElementById("LoginForm")
        var RegForm = document.getElementById("RegForm")
        var Indicator = document.getElementById("Indicator")
        
     function showLogin() {
     document.querySelector('.form-container').classList.remove('register-active');
     document.querySelectorAll('.toggle-btn')[0].classList.add('active');
     document.querySelectorAll('.toggle-btn')[1].classList.add('active');
}

     function showRegister() {
      document.querySelector('.form-container').classList.add('register-active');
      document.querySelectorAll('.toggle-btn')[0].classList.remove('active');
     document.querySelectorAll('.toggle-btn')[1].classList.add('active');
}

showLogin();
</script>

</body>
</html>
